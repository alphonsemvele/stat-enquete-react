# ============================================
# BLUEPRINT YAML - SIH (Système d'Information Hospitalier)
# Projet Laravel + React (Inertia.js)
# ============================================

# ====================
# MODÈLES ET MIGRATIONS
# ====================

models:

  # ==================
  # MODULE UTILISATEURS & AUTHENTIFICATION
  # ==================

  User:
    nom: string:100
    prenom: string:100
    email: string:150 unique
    email_verified_at: timestamp nullable
    password: string
    telephone: string:20 nullable
    avatar: string nullable
    matricule: string:20 unique nullable
    fonction: enum:medecin,infirmier,sage_femme,pharmacien,technicien,laborantin,administratif,receptionniste,comptable nullable
    specialite: string:100 nullable
    service_id: id foreign:services nullable
    date_embauche: date nullable
    statut: enum:actif,inactif,conge,suspendu default:actif
    remember_token: string:100 nullable
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Service
      hasMany: Consultation, Prescription, Pointage, DemandeConge

  Role:
    nom: string:50 unique
    description: text nullable
    couleur: string:20 nullable
    timestamps: true
    relationships:
      belongsToMany: User, Permission

  Permission:
    nom: string:100 unique
    description: text nullable
    module: string:50
    timestamps: true
    relationships:
      belongsToMany: Role

  # ==================
  # MODULE STRUCTURE HOSPITALIÈRE
  # ==================

  Service:
    code: string:20 unique
    nom: string:100
    description: text nullable
    chef_service_id: id foreign:users nullable
    etage: string:10 nullable
    batiment: string:50 nullable
    telephone: string:20 nullable
    email: string:100 nullable
    capacite_lits: integer unsigned default:0
    actif: boolean default:true
    timestamps: true
    softDeletes: true
    relationships:
      hasMany: User, Lit, Patient, Admission
      belongsTo: User:chef_service

  Lit:
    numero: string:20
    service_id: id foreign:services
    chambre: string:20 nullable
    type: enum:standard,soins_intensifs,reanimation,pediatrique,maternite default:standard
    statut: enum:libre,occupe,maintenance,reserve default:libre
    equipements: json nullable
    tarif_journalier: decimal:10,2 default:0
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Service
      hasMany: Admission

  # ==================
  # MODULE PATIENTS
  # ==================

  Patient:
    numero_dossier: string:20 unique
    nom: string:100
    prenom: string:100
    date_naissance: date
    sexe: enum:M,F
    lieu_naissance: string:100 nullable
    nationalite: string:50 default:Camerounaise
    cni: string:30 nullable unique
    telephone: string:20 nullable
    telephone_urgence: string:20 nullable
    email: string:100 nullable
    adresse: text nullable
    ville: string:50 nullable
    quartier: string:100 nullable
    profession: string:100 nullable
    situation_matrimoniale: enum:celibataire,marie,divorce,veuf nullable
    groupe_sanguin: enum:A+,A-,B+,B-,AB+,AB-,O+,O- nullable
    allergies: json nullable
    antecedents_medicaux: json nullable
    antecedents_chirurgicaux: json nullable
    antecedents_familiaux: json nullable
    assurance_id: id foreign:assurances nullable
    numero_assurance: string:50 nullable
    personne_contact_nom: string:100 nullable
    personne_contact_telephone: string:20 nullable
    personne_contact_lien: string:50 nullable
    photo: string nullable
    notes: text nullable
    statut: enum:actif,inactif,decede default:actif
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Assurance
      hasMany: Admission, Consultation, Prescription, RendezVous, Facture, AnalyseLaboratoire, ExamenImagerie, ConstanteVitale, PatientHad

  Assurance:
    code: string:20 unique
    nom: string:100
    type: enum:publique,privee,mutuelle
    adresse: text nullable
    telephone: string:20 nullable
    email: string:100 nullable
    taux_couverture: decimal:5,2 default:0
    plafond_annuel: decimal:12,2 nullable
    delai_paiement: integer unsigned default:30
    contact_nom: string:100 nullable
    contact_telephone: string:20 nullable
    actif: boolean default:true
    timestamps: true
    softDeletes: true
    relationships:
      hasMany: Patient, Facture

  # ==================
  # MODULE ADMISSIONS & HOSPITALISATIONS
  # ==================

  Admission:
    numero: string:20 unique
    patient_id: id foreign:patients
    service_id: id foreign:services
    lit_id: id foreign:lits nullable
    medecin_id: id foreign:users
    type: enum:urgence,programmee,transfert default:programmee
    motif: text
    diagnostic_entree: text nullable
    diagnostic_sortie: text nullable
    date_admission: datetime
    date_sortie: datetime nullable
    mode_sortie: enum:guerison,amelioration,transfert,evasion,deces,contre_avis nullable
    accompagnant_nom: string:100 nullable
    accompagnant_telephone: string:20 nullable
    accompagnant_lien: string:50 nullable
    notes: text nullable
    statut: enum:en_cours,termine,annule default:en_cours
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Patient, Service, Lit, User:medecin
      hasMany: Consultation, Prescription, ConstanteVitale, ActeMedical

  # ==================
  # MODULE CONSULTATIONS
  # ==================

  RendezVous:
    patient_id: id foreign:patients
    medecin_id: id foreign:users
    service_id: id foreign:services nullable
    date_heure: datetime
    duree_minutes: integer unsigned default:30
    type: enum:consultation,suivi,examen,chirurgie,vaccination default:consultation
    motif: text nullable
    notes: text nullable
    statut: enum:planifie,confirme,en_attente,en_cours,termine,annule,absent default:planifie
    timestamps: true
    relationships:
      belongsTo: Patient, User:medecin, Service
      hasOne: Consultation

  Consultation:
    numero: string:20 unique
    patient_id: id foreign:patients
    medecin_id: id foreign:users
    admission_id: id foreign:admissions nullable
    rendez_vous_id: id foreign:rendez_vous nullable
    service_id: id foreign:services nullable
    date_consultation: datetime
    motif: text
    histoire_maladie: text nullable
    examen_clinique: text nullable
    hypotheses_diagnostiques: json nullable
    diagnostic_principal: string:255 nullable
    diagnostics_secondaires: json nullable
    conduite_a_tenir: text nullable
    recommandations: text nullable
    prochain_rdv: date nullable
    duree_minutes: integer unsigned nullable
    statut: enum:en_cours,termine,annule default:en_cours
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Patient, User:medecin, Admission, RendezVous, Service
      hasMany: Prescription, AnalyseLaboratoire, ExamenImagerie, ActeMedical

  ConstanteVitale:
    patient_id: id foreign:patients
    admission_id: id foreign:admissions nullable
    user_id: id foreign:users
    date_mesure: datetime
    poids: decimal:5,2 nullable
    taille: decimal:5,2 nullable
    temperature: decimal:4,2 nullable
    tension_systolique: integer unsigned nullable
    tension_diastolique: integer unsigned nullable
    frequence_cardiaque: integer unsigned nullable
    frequence_respiratoire: integer unsigned nullable
    saturation_oxygene: integer unsigned nullable
    glycemie: decimal:5,2 nullable
    score_douleur: integer unsigned nullable
    notes: text nullable
    timestamps: true
    relationships:
      belongsTo: Patient, Admission, User

  ActeMedical:
    code: string:20
    libelle: string:255
    consultation_id: id foreign:consultations nullable
    admission_id: id foreign:admissions nullable
    patient_id: id foreign:patients
    medecin_id: id foreign:users
    date_acte: datetime
    description: text nullable
    resultat: text nullable
    quantite: integer unsigned default:1
    prix_unitaire: decimal:10,2 default:0
    prix_total: decimal:10,2 default:0
    statut: enum:planifie,en_cours,termine,annule default:planifie
    timestamps: true
    relationships:
      belongsTo: Consultation, Admission, Patient, User:medecin

  # ==================
  # MODULE PRESCRIPTIONS & PHARMACIE
  # ==================

  Medicament:
    code: string:20 unique
    nom: string:200
    dci: string:200 nullable
    forme: enum:comprime,gelule,sirop,injectable,pommade,collyre,suppositoire,solution,poudre,autre
    dosage: string:50 nullable
    categorie: enum:antalgique,antibiotique,anti_inflammatoire,antidiabetique,antihypertenseur,antipaludeen,antiseptique,vitamine,autre
    voie_administration: enum:orale,injectable,cutanee,rectale,oculaire,nasale,auriculaire,autre default:orale
    conditionnement: string:100 nullable
    stock_actuel: integer unsigned default:0
    stock_minimum: integer unsigned default:10
    stock_maximum: integer unsigned default:1000
    prix_achat: decimal:10,2 default:0
    prix_vente: decimal:10,2 default:0
    tva: decimal:5,2 default:0
    fournisseur_id: id foreign:fournisseurs nullable
    date_expiration: date nullable
    emplacement: string:50 nullable
    ordonnance_obligatoire: boolean default:false
    actif: boolean default:true
    notes: text nullable
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Fournisseur
      hasMany: LignePrescription, MouvementStock, LigneCommande

  Fournisseur:
    code: string:20 unique
    nom: string:150
    type: enum:laboratoire,grossiste,importateur
    adresse: text nullable
    ville: string:50 nullable
    pays: string:50 default:Cameroun
    telephone: string:20 nullable
    email: string:100 nullable
    site_web: string:200 nullable
    contact_nom: string:100 nullable
    contact_telephone: string:20 nullable
    delai_livraison_jours: integer unsigned default:7
    conditions_paiement: text nullable
    actif: boolean default:true
    timestamps: true
    softDeletes: true
    relationships:
      hasMany: Medicament, CommandeFournisseur

  Prescription:
    numero: string:20 unique
    patient_id: id foreign:patients
    medecin_id: id foreign:users
    consultation_id: id foreign:consultations nullable
    admission_id: id foreign:admissions nullable
    date_prescription: datetime
    date_validite: date nullable
    instructions_generales: text nullable
    statut: enum:en_attente,partiellement_delivree,delivree,annulee default:en_attente
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Patient, User:medecin, Consultation, Admission
      hasMany: LignePrescription, Delivrance

  LignePrescription:
    prescription_id: id foreign:prescriptions
    medicament_id: id foreign:medicaments
    posologie: string:255
    quantite_prescrite: integer unsigned
    quantite_delivree: integer unsigned default:0
    duree_jours: integer unsigned nullable
    voie_administration: string:50 nullable
    instructions: text nullable
    timestamps: true
    relationships:
      belongsTo: Prescription, Medicament

  Delivrance:
    numero: string:20 unique
    prescription_id: id foreign:prescriptions
    pharmacien_id: id foreign:users
    date_delivrance: datetime
    montant_total: decimal:10,2 default:0
    montant_paye: decimal:10,2 default:0
    mode_paiement: enum:especes,carte,mobile_money,assurance,credit nullable
    notes: text nullable
    statut: enum:en_cours,terminee,annulee default:en_cours
    timestamps: true
    relationships:
      belongsTo: Prescription, User:pharmacien
      hasMany: LigneDelivrance

  LigneDelivrance:
    delivrance_id: id foreign:delivrances
    medicament_id: id foreign:medicaments
    quantite: integer unsigned
    prix_unitaire: decimal:10,2
    prix_total: decimal:10,2
    lot: string:50 nullable
    date_expiration: date nullable
    timestamps: true
    relationships:
      belongsTo: Delivrance, Medicament

  MouvementStock:
    medicament_id: id foreign:medicaments
    type: enum:entree,sortie,ajustement,perte,peremption
    quantite: integer
    stock_avant: integer unsigned
    stock_apres: integer unsigned
    motif: string:255 nullable
    reference: string:50 nullable
    lot: string:50 nullable
    date_expiration: date nullable
    prix_unitaire: decimal:10,2 nullable
    user_id: id foreign:users
    timestamps: true
    relationships:
      belongsTo: Medicament, User

  CommandeFournisseur:
    numero: string:20 unique
    fournisseur_id: id foreign:fournisseurs
    user_id: id foreign:users
    date_commande: date
    date_livraison_prevue: date nullable
    date_livraison_effective: date nullable
    montant_total: decimal:12,2 default:0
    notes: text nullable
    statut: enum:brouillon,envoyee,confirmee,livree_partiellement,livree,annulee default:brouillon
    timestamps: true
    relationships:
      belongsTo: Fournisseur, User
      hasMany: LigneCommande

  LigneCommande:
    commande_id: id foreign:commande_fournisseurs
    medicament_id: id foreign:medicaments
    quantite_commandee: integer unsigned
    quantite_recue: integer unsigned default:0
    prix_unitaire: decimal:10,2
    prix_total: decimal:10,2
    timestamps: true
    relationships:
      belongsTo: CommandeFournisseur:commande, Medicament

  # ==================
  # MODULE LABORATOIRE
  # ==================

  TypeAnalyse:
    code: string:20 unique
    nom: string:150
    categorie: enum:biochimie,hematologie,microbiologie,parasitologie,immunologie,hormonologie,serologie,autre
    description: text nullable
    delai_resultat_heures: integer unsigned default:24
    prix: decimal:10,2 default:0
    valeurs_normales: json nullable
    echantillon_requis: enum:sang,urine,selles,crachat,lcr,autre
    preparation_patient: text nullable
    actif: boolean default:true
    timestamps: true
    relationships:
      hasMany: AnalyseLaboratoire

  AnalyseLaboratoire:
    numero: string:20 unique
    patient_id: id foreign:patients
    consultation_id: id foreign:consultations nullable
    medecin_prescripteur_id: id foreign:users
    technicien_id: id foreign:users nullable
    biologiste_id: id foreign:users nullable
    type_analyse_id: id foreign:type_analyses
    date_prescription: datetime
    date_prelevement: datetime nullable
    date_resultat: datetime nullable
    resultat: json nullable
    interpretation: text nullable
    conclusion: text nullable
    commentaire_medecin: text nullable
    urgent: boolean default:false
    statut: enum:prescrit,preleve,en_cours,resultat_disponible,valide,annule default:prescrit
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Patient, Consultation, User:medecin_prescripteur, User:technicien, User:biologiste, TypeAnalyse

  # ==================
  # MODULE IMAGERIE
  # ==================

  TypeExamenImagerie:
    code: string:20 unique
    nom: string:150
    modalite: enum:radiographie,echographie,scanner,irm,mammographie,autre
    description: text nullable
    preparation_patient: text nullable
    duree_minutes: integer unsigned default:30
    prix: decimal:10,2 default:0
    actif: boolean default:true
    timestamps: true
    relationships:
      hasMany: ExamenImagerie

  ExamenImagerie:
    numero: string:20 unique
    patient_id: id foreign:patients
    consultation_id: id foreign:consultations nullable
    medecin_prescripteur_id: id foreign:users
    radiologue_id: id foreign:users nullable
    manipulateur_id: id foreign:users nullable
    type_examen_id: id foreign:type_examen_imageries
    date_prescription: datetime
    date_examen: datetime nullable
    date_resultat: datetime nullable
    indication_clinique: text nullable
    technique: text nullable
    resultat: text nullable
    conclusion: text nullable
    images_path: json nullable
    urgent: boolean default:false
    statut: enum:prescrit,planifie,en_cours,resultat_disponible,valide,annule default:prescrit
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Patient, Consultation, User:medecin_prescripteur, User:radiologue, User:manipulateur, TypeExamenImagerie

  # ==================
  # MODULE HAD (Hospitalisation À Domicile)
  # ==================

  PatientHad:
    patient_id: id foreign:patients
    medecin_referent_id: id foreign:users
    date_inclusion: date
    date_sortie: date nullable
    motif_inclusion: text
    motif_sortie: text nullable
    adresse_domicile: text
    latitude: decimal:10,7 nullable
    longitude: decimal:10,7 nullable
    personne_reference_nom: string:100 nullable
    personne_reference_telephone: string:20 nullable
    personne_reference_lien: string:50 nullable
    protocole_soins: text nullable
    frequence_visites: enum:quotidien,2_fois_semaine,hebdomadaire,bimensuel default:hebdomadaire
    equipements_domicile: json nullable
    notes: text nullable
    statut: enum:actif,suspendu,termine default:actif
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Patient, User:medecin_referent
      hasMany: Tournee, VisiteHad

  Tournee:
    date: date
    soignant_id: id foreign:users
    vehicule: string:50 nullable
    heure_debut_prevue: time nullable
    heure_fin_prevue: time nullable
    heure_debut_effective: time nullable
    heure_fin_effective: time nullable
    kilometres: decimal:8,2 nullable
    notes: text nullable
    statut: enum:planifiee,en_cours,terminee,annulee default:planifiee
    timestamps: true
    relationships:
      belongsTo: User:soignant
      hasMany: VisiteHad

  VisiteHad:
    tournee_id: id foreign:tournees
    patient_had_id: id foreign:patient_hads
    ordre: integer unsigned default:1
    heure_prevue: time nullable
    heure_arrivee: time nullable
    heure_depart: time nullable
    latitude_arrivee: decimal:10,7 nullable
    longitude_arrivee: decimal:10,7 nullable
    soins_realises: json nullable
    observations: text nullable
    constantes: json nullable
    alertes: json nullable
    signature_patient: text nullable
    photos: json nullable
    statut: enum:planifiee,en_cours,terminee,annulee,reportee default:planifiee
    timestamps: true
    relationships:
      belongsTo: Tournee, PatientHad

  # ==================
  # MODULE FACTURATION
  # ==================

  Facture:
    numero: string:20 unique
    patient_id: id foreign:patients
    admission_id: id foreign:admissions nullable
    assurance_id: id foreign:assurances nullable
    date_facture: date
    date_echeance: date nullable
    montant_brut: decimal:12,2 default:0
    remise: decimal:12,2 default:0
    montant_assurance: decimal:12,2 default:0
    montant_patient: decimal:12,2 default:0
    montant_total: decimal:12,2 default:0
    montant_paye: decimal:12,2 default:0
    tva: decimal:12,2 default:0
    notes: text nullable
    statut: enum:brouillon,emise,partiellement_payee,payee,annulee default:brouillon
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Patient, Admission, Assurance
      hasMany: LigneFacture, Paiement

  LigneFacture:
    facture_id: id foreign:factures
    designation: string:255
    type: enum:consultation,acte_medical,medicament,analyse,imagerie,sejour,autre
    reference_id: integer unsigned nullable
    quantite: integer unsigned default:1
    prix_unitaire: decimal:10,2
    remise: decimal:10,2 default:0
    tva: decimal:10,2 default:0
    prix_total: decimal:10,2
    couvert_assurance: boolean default:false
    timestamps: true
    relationships:
      belongsTo: Facture

  Paiement:
    numero: string:20 unique
    facture_id: id foreign:factures
    date_paiement: datetime
    montant: decimal:12,2
    mode_paiement: enum:especes,carte_bancaire,mobile_money,cheque,virement,assurance
    reference: string:100 nullable
    banque: string:100 nullable
    telephone_mobile_money: string:20 nullable
    recu_par: id foreign:users
    notes: text nullable
    statut: enum:en_attente,confirme,annule default:confirme
    timestamps: true
    relationships:
      belongsTo: Facture, User:recu_par

  # ==================
  # MODULE RH - POINTAGE & CONGÉS
  # ==================

  Pointage:
    user_id: id foreign:users
    date: date
    heure_arrivee: datetime nullable
    heure_depart: datetime nullable
    type: enum:normal,garde,astreinte default:normal
    equipe: enum:matin,apres_midi,nuit nullable
    source: enum:manuel,biometrique,mobile default:manuel
    localisation: string:255 nullable
    notes: text nullable
    statut: enum:present,absent,retard,conge,maladie default:present
    timestamps: true
    relationships:
      belongsTo: User

  DemandeConge:
    user_id: id foreign:users
    type: enum:annuel,maladie,maternite,paternite,sans_solde,recuperation,formation
    date_debut: date
    date_fin: date
    nombre_jours: integer unsigned
    motif: text nullable
    piece_jointe: string nullable
    valideur_id: id foreign:users nullable
    date_validation: datetime nullable
    commentaire_validation: text nullable
    statut: enum:en_attente,approuve,refuse,annule default:en_attente
    timestamps: true
    relationships:
      belongsTo: User, User:valideur

  # ==================
  # MODULE PARAMÈTRES & CONFIGURATIONS
  # ==================

  Parametre:
    cle: string:100 unique
    valeur: text nullable
    type: enum:string,integer,boolean,json,date default:string
    groupe: string:50 nullable
    description: text nullable
    modifiable: boolean default:true
    timestamps: true

  AuditLog:
    user_id: id foreign:users nullable
    action: enum:create,update,delete,view,login,logout,export
    model: string:100
    model_id: integer unsigned nullable
    ancien_valeurs: json nullable
    nouvelles_valeurs: json nullable
    ip_address: string:45 nullable
    user_agent: text nullable
    timestamps: true
    relationships:
      belongsTo: User


# ====================
# CONTRÔLEURS
# ====================

controllers:

  # Authentification
  Auth/LoginController:
    login:
      validate: email, password
      login: user
      redirect: dashboard

  # Dashboard
  DashboardController:
    index:
      query: all:patients, all:admissions, all:rendez_vous
      render: dashboard

  # Patients
  PatientController:
    resource: api
    index:
      query: all:patients
      paginate: 15
    show:
      find: patient
      respond: patient
    store:
      validate: nom, prenom, date_naissance, sexe
      save: patient
      respond: patient
    update:
      find: patient
      validate: nom, prenom, date_naissance, sexe
      update: patient
      respond: patient
    destroy:
      find: patient
      delete: patient
      respond: 204

  # Admissions
  AdmissionController:
    resource: api
    index:
      query: all:admissions
      paginate: 15
    store:
      validate: patient_id, service_id, medecin_id, motif, date_admission
      save: admission
      respond: admission

  # Consultations
  ConsultationController:
    resource: api
    index:
      query: all:consultations
      paginate: 15
    store:
      validate: patient_id, medecin_id, motif, date_consultation
      save: consultation
      respond: consultation

  # Rendez-vous
  RendezVousController:
    resource: api
    index:
      query: all:rendez_vous
      paginate: 15
    store:
      validate: patient_id, medecin_id, date_heure, type
      save: rendez_vous
      respond: rendez_vous

  # Prescriptions
  PrescriptionController:
    resource: api
    index:
      query: all:prescriptions
      paginate: 15
    store:
      validate: patient_id, medecin_id, date_prescription
      save: prescription
      respond: prescription

  # Médicaments
  MedicamentController:
    resource: api
    index:
